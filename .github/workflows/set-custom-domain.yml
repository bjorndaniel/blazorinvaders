name: Set Custom Domain

on:
  workflow_dispatch:
    inputs:
      custom_domain:
        description: 'Custom domain to register, e.g. blazorinvaders.bjorndaniel.se'
        required: true
      app_name:
        description: 'Static Web App name'
        required: true
        default: 'blazorinvaders'
      resource_group:
        description: 'Resource group name'
        required: true
        default: 'blazorinvaders-rg'
      function_app_name:
        description: 'Function App name'
        required: true
        default: 'blazorinvaders-api'

jobs:
  set_domain:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify CNAME exists
        run: |
          DOMAIN="${{ inputs.custom_domain }}"
          echo "Checking CNAME for $DOMAIN..."
          if ! host "$DOMAIN" | grep -q "alias for\|CNAME"; then
            echo "::warning::No CNAME record found for $DOMAIN. DNS may not have propagated yet."
            echo "Attempting to register anyway — Azure will reject it if DNS is not ready."
          else
            echo "CNAME found for $DOMAIN ✓"
          fi

      - name: Register custom domain
        run: |
          az staticwebapp hostname set \
            --name "${{ inputs.app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --hostname "${{ inputs.custom_domain }}"

      - name: Add custom domain to Function App CORS
        run: |
          az functionapp cors add \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --allowed-origins "https://${{ inputs.custom_domain }}"
          az functionapp cors add \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --allowed-origins "https://www.${{ inputs.custom_domain }}"

      - name: Summary
        run: |
          echo "## Custom domain configured ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Domain** | https://${{ inputs.custom_domain }} |" >> $GITHUB_STEP_SUMMARY
          echo "Azure will provision a free SSL certificate automatically (may take a few minutes)." >> $GITHUB_STEP_SUMMARY
