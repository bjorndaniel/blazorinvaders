name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Resource group name"
        required: true
        default: "blazorinvaders-rg"
      location:
        description: "Azure region"
        required: true
        default: "westeurope"
      app_name:
        description: "Static Web App name (must be globally unique)"
        required: true
        default: "blazorinvaders"
      storage_name:
        description: "Storage account name (3-24 lowercase alphanumeric chars, globally unique)"
        required: true
        default: "blazorinvadersstore"
      function_app_name:
        description: "Function App name (must be globally unique)"
        required: true
        default: "blazorinvaders-api"
      custom_domain:
        description: "Custom domain, e.g. yourdomain.com (leave blank to skip)"
        required: false
        default: ""

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name "${{ inputs.resource_group }}" \
            --location "${{ inputs.location }}"

      - name: Create storage account
        run: |
          az storage account create \
            --name "${{ inputs.storage_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --location "${{ inputs.location }}" \
            --sku Standard_LRS \
            --min-tls-version TLS1_2

      - name: Get storage connection string
        id: storage
        run: |
          CONN_STR=$(az storage account show-connection-string \
            --name "${{ inputs.storage_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query connectionString -o tsv)
          echo "::add-mask::$CONN_STR"
          echo "connection_string=$CONN_STR" >> $GITHUB_OUTPUT

      - name: Create Static Web App
        run: |
          az staticwebapp create \
            --name "${{ inputs.app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --location "${{ inputs.location }}" \
            --sku Free

      - name: Create Function App (consumption plan)
        run: |
          az functionapp create \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --storage-account "${{ inputs.storage_name }}" \
            --consumption-plan-location "${{ inputs.location }}" \
            --runtime dotnet-isolated \
            --runtime-version 9 \
            --functions-version 4 \
            --os-type Windows

      - name: Configure Function App settings
        run: |
          az functionapp config appsettings set \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --settings \
              "AzureWebJobsStorage=${{ steps.storage.outputs.connection_string }}" \
              "FUNCTIONS_WORKER_RUNTIME=dotnet-isolated"

      - name: Get SWA deployment token and hostname
        id: swa
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ inputs.app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

          HOSTNAME=$(az staticwebapp show \
            --name "${{ inputs.app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query defaultHostname -o tsv)
          echo "hostname=$HOSTNAME" >> $GITHUB_OUTPUT

      - name: Get Function App hostname
        id: func
        run: |
          FUNC_HOSTNAME=$(az functionapp show \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query defaultHostName -o tsv)
          echo "hostname=$FUNC_HOSTNAME" >> $GITHUB_OUTPUT

      - name: Resolve API URL
        id: urls
        run: |
          SWA_HOSTNAME="${{ steps.swa.outputs.hostname }}"
          DOMAIN="${{ inputs.custom_domain }}"
          if [ -n "$DOMAIN" ]; then
            API_URL="https://$DOMAIN/api"
          else
            API_URL="https://$SWA_HOSTNAME/api"
          fi
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Link Function App as SWA backend
        run: |
          FUNC_ID=$(az functionapp show \
            --name "${{ inputs.function_app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --query id -o tsv)

          az staticwebapp backends link \
            --name "${{ inputs.app_name }}" \
            --resource-group "${{ inputs.resource_group }}" \
            --backend-resource-id "$FUNC_ID" \
            --backend-region "${{ inputs.location }}"

      - name: Save secrets to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SWA_TOKEN: ${{ steps.swa.outputs.deployment_token }}
        run: |
          printf '%s' "$SWA_TOKEN" | gh secret set SWA_DEPLOYMENT_TOKEN \
            --repo "${{ github.repository }}"

          printf '%s' "${{ steps.urls.outputs.api_url }}" | gh secret set FUNCTIONS_API_URL \
            --repo "${{ github.repository }}"

          printf '%s' "${{ inputs.function_app_name }}" | gh secret set AZURE_FUNCTION_APP_NAME \
            --repo "${{ github.repository }}"


      - name: Summary
        run: |
          HOSTNAME="${{ steps.swa.outputs.hostname }}"
          FUNC_HOSTNAME="${{ steps.func.outputs.hostname }}"
          API_URL="${{ steps.urls.outputs.api_url }}"
          DOMAIN="${{ inputs.custom_domain }}"

          echo "## Provisioning complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **App URL** | https://$HOSTNAME |" >> $GITHUB_STEP_SUMMARY
          echo "| **API URL** | $API_URL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "GitHub secrets have been set automatically." >> $GITHUB_STEP_SUMMARY
          if [ -n "$DOMAIN" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Custom domain — action required" >> $GITHUB_STEP_SUMMARY
            echo "Add these DNS records first, then run **Set Custom Domain**:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Type | Host | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| CNAME | \`$DOMAIN\` | \`$HOSTNAME\` |" >> $GITHUB_STEP_SUMMARY
            echo "| CNAME | \`www.$DOMAIN\` | \`$HOSTNAME\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Push to \`master\` (or trigger **Deploy** manually) to publish the app." >> $GITHUB_STEP_SUMMARY
