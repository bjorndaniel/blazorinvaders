name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Inject API URL into appsettings.json
        run: |
          sed -i "s|#{FUNCTIONS_API_URL}#|${{ secrets.FUNCTIONS_API_URL }}|g" \
            src/wwwroot/appsettings.json

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/BlazorInvaders.csproj \
            -c Release \
            -o release \
            --nologo

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: release/wwwroot
          api_location: src/api
          skip_app_build: true
